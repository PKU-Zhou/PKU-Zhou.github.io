# ==========================================
# 网站核心信息（必须和你的域名匹配）
# ==========================================
title: Welcome!
description: This is Zecheng Zhou's space!
url: "https://pku-zhou.github.io"  # 你的GitHub Pages域名
baseurl: ""  # 个人主页仓库必须留空！

# ==========================================
# Cayman 主题专属配置（官方主题，无需额外依赖）
# ==========================================
theme: jekyll-theme-cayman
show_downloads: false  # 关闭项目页默认的下载按钮，适合个人主页

# ==========================================
# Jekyll 基础渲染配置（无需修改）
# ==========================================
markdown: kramdown
permalink: pretty
exclude: [README.md, LICENSE, .gitignore]



# ==========================================
# 定义笔记分类集合（Collections）
# ==========================================
collections:
  tapeout:
    output: true          # 让每篇笔记生成独立页面
    permalink: /tapeout/:title/  # 笔记URL格式
  gpu:
    output: true
    permalink: /gpu/:title/
  pim:
    output: true
    permalink: /pim/:title/

# ==========================================
# 可选：给分类起个中文显示名
# ==========================================
defaults:
  - scope:
      path: ""
      type: "tapeout"
    values:
      category_name: "流片笔记"
  - scope:
      path: ""
      type: "gpu"
    values:
      category_name: "GPU编程"
  - scope:
      path: ""
      type: "pim"
    values:
      category_name: "存算一体"