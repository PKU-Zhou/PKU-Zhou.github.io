# ==========================================
# 1. 网站核心基础信息（必填，按需修改）
# ==========================================
title: Welcome to Zecheng Zhou's homepage!
description: This is my space! # 修正了拼写错误
url: "https://zechengzhou.github.io" # 替换为你的GitHub Pages地址（格式：https://你的用户名.github.io）
baseurl: "" # 【关键】如果是【用户名.github.io】仓库，留空；如果是其他仓库，填 /你的仓库名（注意开头的斜杠）

# ==========================================
# 2. Cayman 主题专属配置
# ==========================================
theme: jekyll-theme-cayman # 保持你选的Cayman主题

# Cayman主题可选：是否在页面右上角显示"Download ZIP"按钮（个人主页建议关闭）
show_downloads: false

# ==========================================
# 3. Jekyll 基础渲染配置（建议保留，无需改动）
# ==========================================
markdown: kramdown # Markdown渲染器
permalink: pretty # 生成的URL更简洁（去掉.html后缀）
exclude: [README.md, LICENSE] # 构建时排除仓库里的非网页文件

# ==========================================
# 4. 可选增强配置（后续想加功能时再取消注释修改）
# ==========================================
# 社交链接（Cayman主题默认不直接显示，但可用于后续自定义页面或插件）
# social:
#   - { platform: github, user_url: "https://github.com/你的用户名" }
#   - { platform: linkedin, user_url: "https://linkedin.com/in/你的用户名" }
#   - { platform: email, user_url: "mailto:你的邮箱@example.com" }

# Google Analytics（如果需要统计访问量）
# google_analytics: UA-XXXXXXXXX-X
